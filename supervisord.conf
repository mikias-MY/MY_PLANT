[supervisord]
nodaemon=true
user=root
# Log supervisor itself to stdout so Railway captures it
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info
pidfile=/var/run/supervisord.pid

[program:gunicorn]
command=gunicorn --bind 0.0.0.0:5000 app:app --timeout 120 --workers 2 --log-level info
directory=/app/backend
autostart=true
autorestart=true
startretries=5
# Pipe logs directly to container stdout/stderr for Railway log capture
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
startretries=5
# Nginx writes access/error logs to /dev/stdout|stderr (set in nginx_prod.conf)
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
